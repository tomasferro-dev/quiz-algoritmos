<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Algo-Trivia · Juegos de Algoritmos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root { --rojo:#e21b3c; --azul:#1368ce; --amar:#d89e00; --verde:#26890c; --bg1:#46178f; --bg2:#7b2ff7; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: linear-gradient(160deg, var(--bg1), var(--bg2));
    color: #fff; min-height: 100dvh; display: flex; flex-direction: column; overflow-x: hidden;
  }
  .wrap { flex: 1; display: flex; flex-direction: column; padding: 18px; max-width: 600px; margin: 0 auto; width: 100%; }
  .screen { display: none; flex: 1; flex-direction: column; animation: fade .25s ease; }
  .screen.active { display: flex; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px);} to {opacity:1; transform:none;} }
  @keyframes pop { 0%{transform:scale(.6);opacity:0;} 60%{transform:scale(1.15);} 100%{transform:scale(1);opacity:1;} }
  @keyframes floatUp { from{transform:translateY(0);opacity:1;} to{transform:translateY(-40px);opacity:0;} }

  .center { justify-content: center; align-items: center; text-align: center; gap: 14px; }
  h1 { font-size: 1.9rem; line-height: 1.15; text-shadow: 0 3px 0 rgba(0,0,0,.25); }
  .sub { font-size: 1rem; opacity: .9; }
  .emoji { font-size: 3.4rem; }
  .btn { background: #fff; color: #46178f; border: none; border-radius: 14px; font-size: 1.15rem; font-weight: 800; padding: 16px 26px; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,.25); transition: transform .08s; }
  .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,.25); }
  .btnghost { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,.6); border-radius: 14px; font-size: 1rem; font-weight: 700; padding: 12px 22px; cursor: pointer; }
  .btnghost:active { background: rgba(255,255,255,.12); }
  .nameinput { width: 100%; max-width: 320px; border: none; border-radius: 12px; padding: 14px 16px; font-size: 1.1rem; font-weight: 700; text-align: center; color: #1c1c28; }

  /* MENÚ */
  .menuhead { text-align: center; margin: 8px 0 20px; }
  .menuhead .emoji { display:block; }
  .quizlist { display: flex; flex-direction: column; gap: 14px; }
  .quizcard { display: flex; align-items: center; gap: 14px; text-align: left; background: rgba(255,255,255,.97); color: #1c1c28; border: none; border-radius: 16px; padding: 16px; cursor: pointer; width: 100%; box-shadow: 0 5px 0 rgba(0,0,0,.25); transition: transform .08s; }
  .quizcard:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,.25); }
  .quizcard.locked { opacity: .6; cursor: default; }
  .qc-emoji { font-size: 2.2rem; flex-shrink: 0; }
  .qc-text { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .qc-title { font-size: 1.15rem; font-weight: 900; line-height: 1.1; }
  .qc-sub { font-size: .85rem; color: #555; line-height: 1.2; }
  .qc-arrow { font-size: 1.3rem; color: var(--bg1); flex-shrink: 0; }

  /* HEADER JUEGO */
  .top { display: flex; justify-content: space-between; align-items: center; font-weight: 800; margin-bottom: 10px; font-size: 1.05rem; }
  .timer { display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,.22); padding: 4px 12px; border-radius: 99px; }
  .timer.low { background: var(--rojo); animation: pulse .5s infinite alternate; }
  @keyframes pulse { from{transform:scale(1);} to{transform:scale(1.08);} }
  .bar { height: 8px; background: rgba(255,255,255,.25); border-radius: 99px; overflow: hidden; margin-bottom: 16px; }
  .bar > i { display: block; height: 100%; background: #ffd400; width: 100%; }

  .q { background: rgba(255,255,255,.97); color: #1c1c28; border-radius: 16px; padding: 20px 18px; font-size: 1.25rem; font-weight: 800; text-align: center; min-height: 110px; display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 18px rgba(0,0,0,.2); margin-bottom: 16px; position: relative; }
  .gain { position: absolute; top: -10px; right: 14px; color: var(--verde); font-weight: 900; font-size: 1.5rem; animation: floatUp 1s ease forwards; }
  .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto; }
  .opt { border: none; border-radius: 12px; color: #fff; font-weight: 800; font-size: 1.05rem; padding: 22px 12px; cursor: pointer; min-height: 78px; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 5px 0 rgba(0,0,0,.28); transition: transform .08s, opacity .2s; text-align: center; }
  .opt:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,.28); }
  .opt .sym { font-size: 1.3rem; }
  .o0 { background: var(--rojo);} .o1 { background: var(--azul);} .o2 { background: var(--amar);} .o3 { background: var(--verde);}
  .opts.locked .opt { opacity: .4; }
  .opts.locked .opt.right { opacity: 1; outline: 4px solid #fff; }
  .opts.locked .opt.wrong { opacity: 1; outline: 4px solid #fff; filter: grayscale(.3); }

  .feedback { text-align: center; font-size: 1.3rem; font-weight: 800; margin-top: 14px; min-height: 30px; }
  .hidden { display: none !important; }

  .scorebig { font-size: 3.4rem; font-weight: 900; animation: pop .5s ease; }
  .msg { font-size: 1.2rem; opacity: .95; }
  .stat { font-size: 1rem; opacity: .9; }
  .savestate { font-size: .85rem; opacity: .85; min-height: 18px; }
  .capture { background: #ffd400; color: #1c1c28; font-weight: 800; font-size: 1rem; border-radius: 14px; padding: 14px 16px; margin: 6px 4px 4px; line-height: 1.35; box-shadow: 0 4px 0 rgba(0,0,0,.25); }
  .endbtns { display: flex; flex-direction: column; gap: 10px; align-items: center; width: 100%; }

  /* RANKING */
  .lbhead { text-align: center; margin-bottom: 14px; }
  .seg { display: flex; gap: 8px; margin-bottom: 14px; }
  .seg button { flex: 1; border: 2px solid rgba(255,255,255,.4); background: rgba(255,255,255,.1); color: #fff; font-weight: 800; font-size: .9rem; border-radius: 12px; padding: 10px 6px; cursor: pointer; }
  .seg button.on { background: #fff; color: var(--bg1); border-color: #fff; }
  .lblist { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .lbrow { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,.95); color: #1c1c28; border-radius: 12px; padding: 12px 14px; box-shadow: 0 3px 0 rgba(0,0,0,.2); }
  .lbrow.me { outline: 3px solid #ffd400; }
  .lb-pos { font-weight: 900; font-size: 1.1rem; width: 34px; text-align: center; flex-shrink: 0; }
  .lb-name { flex: 1; font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-score { font-weight: 900; color: var(--bg1); }
  .lbempty { text-align: center; opacity: .85; padding: 20px; line-height: 1.5; }
  .lb-del { border: none; background: var(--rojo); color:#fff; font-weight: 900; border-radius: 8px; width: 32px; height: 32px; font-size: 1rem; cursor: pointer; flex-shrink: 0; }
  .adminbox { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; align-items: center; }
  #adminForm { display: flex; flex-direction: column; gap: 8px; align-items: center; margin-top: 8px; }
  footer { text-align: center; font-size: .75rem; opacity: .6; padding: 10px; }
</style>
</head>
<body>
<div class="wrap">

  <!-- MENÚ -->
  <section id="menu" class="screen active">
    <div class="menuhead">
      <span class="emoji">🎮</span>
      <h1>Algo-Trivia</h1>
      <div class="sub">Elegí un desafío</div>
    </div>
    <div id="quizList" class="quizlist"></div>
    <div style="margin-top:18px; text-align:center;">
      <button class="btnghost" onclick="openLeaderboard()">🏆 Ver ranking</button>
    </div>
  </section>

  <!-- PORTADA / NOMBRE -->
  <section id="start" class="screen center">
    <div class="emoji" id="startEmoji">🧠</div>
    <h1 id="startTitle">Quiz</h1>
    <div class="sub" id="startSub"></div>
    <input class="nameinput" id="playerName" maxlength="20" placeholder="Escribí tu nombre" autocomplete="off">
    <button class="btn" onclick="beginQuiz()">¡Empezar!</button>
    <button class="btnghost" onclick="show('menu')">← Volver al menú</button>
  </section>

  <!-- JUEGO -->
  <section id="game" class="screen">
    <div class="top">
      <span id="counter">1 / 5</span>
      <span class="timer" id="timerBox">⏱️ <b id="timer">20</b></span>
      <span id="score">🏆 0</span>
    </div>
    <div class="bar"><i id="prog"></i></div>
    <div class="q" id="question">Pregunta</div>
    <div class="opts" id="opts"></div>
    <div class="feedback" id="feedback"></div>
  </section>

  <!-- RESULTADO -->
  <section id="end" class="screen center">
    <div class="emoji" id="endEmoji">🏆</div>
    <div class="scorebig" id="finalScore">0</div>
    <div class="stat">puntos</div>
    <div class="stat" id="finalCorrect">0 / 5 correctas</div>
    <div class="msg" id="finalMsg"></div>
    <div class="savestate" id="saveState"></div>
    <div class="capture">📸 Sacale una captura a esta pantalla y subila a los comentarios de la plataforma.</div>
    <div class="endbtns">
      <button class="btn" onclick="openLeaderboard(lastQuizId)">🏆 Ver ranking</button>
      <button class="btnghost" onclick="replay()">Jugar de nuevo 🔁</button>
      <button class="btnghost" onclick="show('menu')">🎮 Volver al menú</button>
    </div>
  </section>

  <!-- RANKING / LEADERBOARD -->
  <section id="leaderboard" class="screen">
    <div class="lbhead"><span class="emoji">🏆</span><h1>Ranking</h1></div>
    <div class="seg" id="lbSeg"></div>
    <div class="lblist" id="lbList"></div>

    <div class="adminbox">
      <div id="adminLogin">
        <button class="btnghost" onclick="toggleAdminForm()">🔐 Modo profe</button>
        <div id="adminForm" class="hidden">
          <input class="nameinput" id="admEmail" type="email" placeholder="Email de profe" autocomplete="username">
          <input class="nameinput" id="admPass" type="password" placeholder="Contraseña" autocomplete="current-password">
          <button class="btn" onclick="adminLogin()">Entrar</button>
          <div class="savestate" id="admMsg"></div>
        </div>
      </div>
      <div id="adminActive" class="hidden">
        <div class="savestate" id="admWho"></div>
        <button class="btnghost" onclick="adminLogout()">Salir de modo profe</button>
      </div>
    </div>

    <div style="margin-top:16px; text-align:center;">
      <button class="btnghost" onclick="leaveLeaderboard()">🎮 Volver al menú</button>
    </div>
  </section>

</div>
<footer>Introducción a Algoritmos · Procesamiento Digital</footer>

  storageBucket: "juegos-colegio.firebasestorage.app",

};

// (Firebase se inicializa más abajo, dentro del try)


  // 🔺🔺🔺  ----------------------------------------------------  🔺🔺🔺

  try {
    if (firebaseConfig.apiKey === "TU_API_KEY") throw new Error("Firebase sin configurar");
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    window.fb = {
      ready: true,
      async saveScore(quizId, data) {
        await addDoc(collection(db, "rankings", quizId, "scores"),
          { ...data, createdAt: serverTimestamp() });
      },
      watchTop(quizId, cb) {
        const qy = query(collection(db, "rankings", quizId, "scores"),
          orderBy("score", "desc"), limit(20));
        return onSnapshot(qy, snap => cb(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
      },
      deleteScore(quizId, id) {
        return deleteDoc(doc(db, "rankings", quizId, "scores", id));
      },
      login(email, pass) { return signInWithEmailAndPassword(auth, email, pass); },
      logout() { return signOut(auth); },
      onAuth(cb) { return onAuthStateChanged(auth, cb); }
    };
  } catch (e) {
    window.fb = { ready: false, error: e.message };
  }
  window.dispatchEvent(new Event("fb-ready"));
</script>

<script>
const QUIZZES = [
  {
    id: "trivia1",
    emoji: "🧠",
    title: "Algo-Trivia · Nivel 1",
    subtitle: "Qué es un algoritmo, pseudocódigo y secuencias",
    questions: [
      { q: "¿Cuántas formas principales de representar un algoritmo hay?",
        options: ["Dos", "Tres", "Cuatro", "Cinco"], correct: 1 },
      { q: "¿Qué forma de representación puede ser ambigua?",
        options: ["Pseudocódigo", "Diagrama de flujo", "Lenguaje natural", "Código real"], correct: 2 },
      { q: "El pseudocódigo es un lenguaje de programación real.",
        options: ["Verdadero", "Falso"], correct: 1 },
      { q: "¿Cuándo se usa el pseudocódigo?",
        options: ["Antes de programar", "Después de programar", "Durante la ejecución", "Nunca"], correct: 0 },
      { q: "¿Cuál es una palabra clave típica del pseudocódigo?",
        options: ["INICIO", "HOLA", "COLOR", "RÁPIDO"], correct: 0 },
      { q: "En el pseudocódigo, ¿qué palabra marca el final?",
        options: ["FIN", "STOP", "ALTO", "CHAU"], correct: 0 },
      { q: "El lenguaje natural puede ser ambiguo.",
        options: ["Verdadero", "Falso"], correct: 0 },
      { q: "Una receta de cocina es un ejemplo de algoritmo.",
        options: ["Verdadero", "Falso"], correct: 0 },
      { q: "¿Qué forma de representación es la más accesible pero ambigua?",
        options: ["Lenguaje natural", "Pseudocódigo", "Diagrama de flujo", "Código real"], correct: 0 },
      { q: "En una estructura secuencial, ¿cómo se ejecutan los pasos?",
        options: ["Uno tras otro, en orden", "Todos al mismo tiempo", "En orden al azar", "De abajo hacia arriba"], correct: 0 },
      { q: "La estructura secuencial es la más simple de todas.",
        options: ["Verdadero", "Falso"], correct: 0 },
      { q: "En una estructura secuencial, ¿se repiten pasos?",
        options: ["No", "Sí, siempre", "Solo el último", "Solo si hay error"], correct: 0 },
      { q: "En una secuencia, cada paso se ejecuta exactamente...",
        options: ["Una vez", "Dos veces", "Mil veces", "Cero veces"], correct: 0 },
      { q: "En el ejemplo \"total ← precio + iva\", ¿qué guarda la variable total?",
        options: ["El precio con IVA", "El precio sin IVA", "Solo el IVA", "El descuento"], correct: 0 }
    ]
  },
  {
    id: "detective",
    emoji: "🕵️",
    title: "Detective de Código",
    subtitle: "Leé la línea y descubrí qué hace",
    questions: [
      { q: "¿Qué hace la línea:  LEER numero ?",
        options: ["Pide un dato al usuario", "Muestra un mensaje", "Suma dos números", "Termina el programa"], correct: 0 },
      { q: "¿Qué hace la línea:  ESCRIBIR \"Hola\" ?",
        options: ["Muestra un mensaje", "Pide un dato al usuario", "Borra todo", "Crea una variable"], correct: 0 },
      { q: "En  iva ← precio * 0.21 , el símbolo ← significa...",
        options: ["Asigna un valor", "Compara valores", "Resta", "Termina"], correct: 0 },
      { q: "La línea  total ← precio + iva  realiza una suma.",
        options: ["Verdadero", "Falso"], correct: 0 },
      { q: "¿Qué calcula la línea  promedio ← suma / 3 ?",
        options: ["El promedio de 3 valores", "La suma total", "El mayor de 3", "El resto de dividir"], correct: 0 },
      { q: "En  SI numero > 0 ENTONCES , ¿qué es  \"> 0\" ?",
        options: ["Una condición", "Una suma", "Un mensaje", "El final"], correct: 0 },
      { q: "La línea  suma ← suma + nota  va acumulando valores.",
        options: ["Verdadero", "Falso"], correct: 0 },
      { q: "En  PARA i DESDE 1 HASTA 3 , ¿cuántas veces se repite?",
        options: ["3 veces", "1 vez", "Infinitas", "Ninguna"], correct: 0 },
      { q: "En  iva ← precio * 0.21 , ¿qué es  \"precio\" ?",
        options: ["Una variable", "Una palabra clave", "Un texto", "El final"], correct: 0 },
      { q: "La palabra ESCRIBIR se usa para mostrar datos (salida).",
        options: ["Verdadero", "Falso"], correct: 0 }
    ]
  }
];

const SYM = ["▲","◆","●","■"];
const TIME_LIMIT = 20, MAX_POINTS = 1000, FEEDBACK_MS = 1600;

// id de jugador estable (para resaltar mi fila en el ranking)
let playerId = localStorage.getItem("algoPlayerId");
if(!playerId){ playerId = "p" + Math.abs(hashStr(navigator.userAgent + performance.now())); localStorage.setItem("algoPlayerId", playerId); }

let currentQuiz = null, Q = [], lastQuizId = "trivia1";
let order = [], idx = 0, score = 0, correctCount = 0, answered = false;
let timeLeft = 0, tick = null, lbUnsub = null;
let isAdmin = false, currentLbQuiz = null;

function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i))|0; } return h; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* ---------- MENÚ ---------- */
function renderMenu(){
  const list = document.getElementById('quizList');
  list.innerHTML = '';
  QUIZZES.forEach((quiz, i) => {
    const card = document.createElement('button');
    card.className = 'quizcard' + (quiz.locked ? ' locked' : '');
    card.innerHTML =
      '<span class="qc-emoji">' + quiz.emoji + '</span>' +
      '<span class="qc-text"><span class="qc-title">' + quiz.title + '</span>' +
      '<span class="qc-sub">' + quiz.subtitle + '</span></span>' +
      '<span class="qc-arrow">' + (quiz.locked ? '🔒' : '▶') + '</span>';
    if(!quiz.locked) card.onclick = () => openQuiz(i);
    list.appendChild(card);
  });
}

function openQuiz(i){
  currentQuiz = QUIZZES[i];
  Q = currentQuiz.questions;
  document.getElementById('startEmoji').textContent = currentQuiz.emoji;
  document.getElementById('startTitle').textContent = currentQuiz.title;
  document.getElementById('startSub').textContent = Q.length + ' preguntas · ¡respondé rápido para sumar más puntos!';
  document.getElementById('playerName').value = localStorage.getItem("algoPlayerName") || "";
  show('start');
}

function beginQuiz(){
  const name = document.getElementById('playerName').value.trim();
  if(!name){ alert("Escribí tu nombre para jugar 🙂"); return; }
  localStorage.setItem("algoPlayerName", name);
  order = shuffle([...Array(Q.length).keys()]);
  idx = 0; score = 0; correctCount = 0;
  show('game');
  renderQuestion();
}

function replay(){ openQuiz(QUIZZES.indexOf(currentQuiz)); }

/* ---------- JUEGO ---------- */
function renderQuestion(){
  answered = false;
  const data = Q[order[idx]];
  document.getElementById('counter').textContent = (idx+1) + " / " + Q.length;
  document.getElementById('score').textContent = "🏆 " + score;
  document.getElementById('question').textContent = data.q;
  document.getElementById('feedback').textContent = "";
  const opts = data.options.map((t,i)=>({t, ok: i===data.correct}));
  shuffle(opts);
  const box = document.getElementById('opts');
  box.className = 'opts'; box.innerHTML = '';
  opts.forEach((o,i)=>{
    const b = document.createElement('button');
    b.className = 'opt o'+i;
    b.innerHTML = '<span class="sym">'+SYM[i]+'</span><span>'+o.t+'</span>';
    b.onclick = ()=> answer(b, o.ok, box);
    box.appendChild(b);
  });
  startTimer();
}

function startTimer(){
  timeLeft = TIME_LIMIT; updateTimer(); clearInterval(tick);
  tick = setInterval(()=>{ timeLeft--; updateTimer(); if(timeLeft<=0){ clearInterval(tick); timeUp(); } }, 1000);
}
function updateTimer(){
  document.getElementById('timer').textContent = timeLeft;
  document.getElementById('timerBox').classList.toggle('low', timeLeft <= 5);
  document.getElementById('prog').style.width = (timeLeft/TIME_LIMIT*100) + "%";
}
function pointsForTime(){
  const used = TIME_LIMIT - timeLeft;
  return Math.max(500, Math.round(MAX_POINTS * (1 - (used / TIME_LIMIT) / 2)));
}

function answer(btn, ok, box){
  if(answered) return;
  answered = true; clearInterval(tick);
  box.classList.add('locked'); revealCorrect(box);
  btn.classList.add(ok ? 'right' : 'wrong');
  const fb = document.getElementById('feedback');
  if(ok){ const g = pointsForTime(); score += g; correctCount++; fb.textContent = "✅ ¡Correcto! +" + g; showGain("+"+g); }
  else { fb.textContent = "❌ ¡Casi!"; }
  document.getElementById('score').textContent = "🏆 " + score;
  setTimeout(nextQuestion, FEEDBACK_MS);
}
function timeUp(){
  if(answered) return; answered = true;
  const box = document.getElementById('opts'); box.classList.add('locked'); revealCorrect(box);
  document.getElementById('feedback').textContent = "⌛ ¡Se acabó el tiempo!";
  setTimeout(nextQuestion, FEEDBACK_MS);
}
function revealCorrect(box){
  const data = Q[order[idx]];
  const correctText = data.options[data.correct];
  [...box.children].forEach(c => { if(c.querySelector('span:last-child').textContent === correctText) c.classList.add('right'); });
}
function showGain(txt){
  const g = document.createElement('div'); g.className = 'gain'; g.textContent = txt;
  document.getElementById('question').appendChild(g); setTimeout(()=> g.remove(), 1000);
}
function nextQuestion(){ idx++; if(idx >= Q.length) showEnd(); else renderQuestion(); }

function showEnd(){
  clearInterval(tick); show('end');
  const total = Q.length;
  lastQuizId = currentQuiz.id;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalCorrect').textContent = correctCount + " / " + total + " correctas";
  const pct = correctCount/total;
  let emoji, msg;
  if(pct === 1){ emoji="🏆"; msg="¡Perfecto! Dominás el tema."; }
  else if(pct >= 0.6){ emoji="🎉"; msg="¡Muy bien! Casi todo."; }
  else if(pct >= 0.4){ emoji="💪"; msg="Vas bien, repasá un poco más."; }
  else { emoji="📚"; msg="A repasar el material y volver a intentar."; }
  document.getElementById('endEmoji').textContent = emoji;
  document.getElementById('finalMsg').textContent = msg;
  saveScore(total);
}

/* ---------- FIREBASE: guardar puntaje ---------- */
function saveScore(total){
  const el = document.getElementById('saveState');
  const name = localStorage.getItem("algoPlayerName") || "Anónimo";
  if(!window.fb || !window.fb.ready){
    el.textContent = "⚠️ Ranking no disponible (Firebase sin configurar).";
    return;
  }
  el.textContent = "Guardando en el ranking…";
  window.fb.saveScore(currentQuiz.id, { name, playerId, score, correct: correctCount, total })
    .then(()=> el.textContent = "✅ Puntaje guardado en el ranking.")
    .catch(err => el.textContent = "⚠️ No se pudo guardar (" + err.message + ").");
}

/* ---------- RANKING ---------- */
function openLeaderboard(quizId){
  const id = quizId || (currentQuiz ? currentQuiz.id : QUIZZES[0].id);
  show('leaderboard');
  renderSeg(id);
  watchBoard(id);
}
function renderSeg(activeId){
  const seg = document.getElementById('lbSeg'); seg.innerHTML = '';
  QUIZZES.filter(q=>!q.locked).forEach(quiz=>{
    const b = document.createElement('button');
    b.textContent = quiz.emoji + " " + quiz.title;
    b.className = quiz.id === activeId ? 'on' : '';
    b.onclick = ()=>{ renderSeg(quiz.id); watchBoard(quiz.id); };
    seg.appendChild(b);
  });
}
function watchBoard(quizId){
  currentLbQuiz = quizId;
  if(lbUnsub){ lbUnsub(); lbUnsub = null; }
  const list = document.getElementById('lbList');
  if(!window.fb || !window.fb.ready){
    list.innerHTML = '<div class="lbempty">El ranking necesita Firebase configurado.<br>Mientras tanto, los puntajes no se comparten.</div>';
    return;
  }
  list.innerHTML = '<div class="lbempty">Cargando ranking…</div>';
  lbUnsub = window.fb.watchTop(quizId, rows => {
    if(!rows.length){ list.innerHTML = '<div class="lbempty">Todavía no hay puntajes.<br>¡Sé el primero en jugar! 🚀</div>'; return; }
    const medals = ["🥇","🥈","🥉"];
    list.innerHTML = '';
    rows.forEach((r, i) => {
      const row = document.createElement('div');
      row.className = 'lbrow' + (r.playerId === playerId ? ' me' : '');
      let html =
        '<span class="lb-pos">' + (medals[i] || (i+1)) + '</span>' +
        '<span class="lb-name">' + escapeHtml(r.name || "Anónimo") + '</span>' +
        '<span class="lb-score">' + (r.score||0) + '</span>';
      if(isAdmin && r.id) html += '<button class="lb-del" title="Eliminar intento">🗑</button>';
      row.innerHTML = html;
      if(isAdmin && r.id) row.querySelector('.lb-del').onclick = () => deleteEntry(quizId, r.id, r.name);
      list.appendChild(row);
    });
  });
}
function leaveLeaderboard(){ if(lbUnsub){ lbUnsub(); lbUnsub = null; } show('menu'); }

/* ---------- ADMIN (modo profe) ---------- */
function toggleAdminForm(){ document.getElementById('adminForm').classList.toggle('hidden'); }
function adminLogin(){
  const email = document.getElementById('admEmail').value.trim();
  const pass = document.getElementById('admPass').value;
  const msg = document.getElementById('admMsg');
  if(!email || !pass){ msg.textContent = "Completá email y contraseña."; return; }
  if(!window.fb || !window.fb.ready){ msg.textContent = "Firebase no disponible."; return; }
  msg.textContent = "Entrando…";
  window.fb.login(email, pass)
    .then(()=>{ msg.textContent = ""; document.getElementById('admPass').value = ""; })
    .catch(e => msg.textContent = "Error: " + (e.code || e.message));
}
function adminLogout(){ if(window.fb && window.fb.ready) window.fb.logout(); }
function deleteEntry(quizId, id, name){
  if(!confirm('¿Eliminar el intento de "' + (name || "Anónimo") + '" del ranking?')) return;
  window.fb.deleteScore(quizId, id).catch(e => alert("No se pudo eliminar: " + (e.code || e.message)));
}
function initAuth(){
  if(!(window.fb && window.fb.ready && window.fb.onAuth)) return;
  window.fb.onAuth(user => {
    isAdmin = !!user;
    document.getElementById('adminLogin').classList.toggle('hidden', isAdmin);
    document.getElementById('adminActive').classList.toggle('hidden', !isAdmin);
    if(isAdmin) document.getElementById('admWho').textContent = "👤 " + (user.email || "profe") + " — tocá 🗑 para eliminar intentos";
    if(document.getElementById('leaderboard').classList.contains('active') && currentLbQuiz) watchBoard(currentLbQuiz);
  });
}
window.addEventListener('fb-ready', initAuth);
if(window.fb) initAuth();
function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

renderMenu();
</script>
