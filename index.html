<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algo-Trivia · En mantenimiento</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: linear-gradient(160deg, #46178f, #7b2ff7);
    color: #fff; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    text-align: center; padding: 24px;
  }
  .card {
    max-width: 460px;
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.18);
    border-radius: 20px; padding: 36px 28px;
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
  }
  .emoji { font-size: 4rem; line-height: 1; }
  h1 { font-size: 1.7rem; margin: 16px 0 10px; text-shadow: 0 3px 0 rgba(0,0,0,.25); }
  p { font-size: 1.05rem; opacity: .92; line-height: 1.5; }
  .muted { font-size: .85rem; opacity: .65; margin-top: 22px; }
</style>
</head>
<body>
  <div class="card">
    <div class="emoji">🛠️</div>
    <h1>Estamos en mantenimiento</h1>
    <p>El juego está en pausa por el momento.<br>Volvé a intentarlo más tarde.</p>
    <div class="muted">Algo-Trivia · Introducción a Algoritmos</div>
  </div>
</body>
</html>
